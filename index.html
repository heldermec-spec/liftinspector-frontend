<!DOCTYPE html>
<html>
<head>
  <title>LexusLiftPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f3f4f6; padding:20px;">

<h1>🚀 LexusLiftPro</h1>

<div style="background:white; padding:20px; border-radius:10px; max-width:400px;">
  
  <h3>Teste de Análise IA</h3>

  <input id="item" placeholder="Ex: cabo de aço"
    style="width:100%; padding:10px; margin-bottom:10px;" />

  <button onclick="testar()"
    style="width:100%; padding:10px; background:#2563eb; color:white; border:none;">
    Analisar
  </button>

  <p id="status"></p>

  <pre id="resultado" style="margin-top:15px;"></pre>

</div>

<script>
async function testar() {

  document.getElementById("status").innerText = "Processando...";

  try {
    const res = await fetch("https://api.lexusliftpro.com/analise", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ item: document.getElementById("item").value })
    });

    const data = await res.json();

    document.getElementById("resultado").innerText =
      JSON.stringify(data, null, 2);

    document.getElementById("status").innerText = "✅ Sucesso";

  } catch (err) {

    document.getElementById("status").innerText =
      "❌ Erro: " + err.message;

    console.error(err);
  }
}
</script>

</body>
</html>

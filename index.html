<!DOCTYPE html>
<html>
<head>
  <title>LexusLiftPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f3f4f6; padding:20px;">

<h1>🚀 LexusLiftPro</h1>

<h2>📊 Dashboard</h2>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">

  <div style="background:white; padding:15px;">
    <h3>Total Inspeções</h3>
    <p id="total">0</p>
  </div>

  <div style="background:white; padding:15px;">
    <h3>Não Conformes</h3>
    <p id="nao">0</p>
  </div>

  <div style="background:white; padding:15px;">
    <h3>OS Abertas</h3>
    <p id="os">0</p>
  </div>

  <div style="background:white; padding:15px;">
    <h3>Custo Total</h3>
    <p id="custo">0</p>
  </div>

</div>

<h2>🛠️ Checklist</h2>

<select id="norma" onchange="carregarChecklist()">
  <option value="nr11">NR11</option>
  <option value="nr10">NR10</option>
  <option value="nr12">NR12</option>
</select>

<div id="checklist"></div>

<button onclick="salvarChecklist()" style="margin-top:10px; padding:10px; background:green; color:white;">
Salvar Checklist
</button>

<p id="status"></p>

<h2>📋 Últimas OS</h2>
<pre id="lista"></pre>

<script>

const itens = {
  nr11: ["Cabo de aço", "Gancho", "Corrente", "Freio"],
  nr10: ["Isolamento", "Aterramento", "Painel elétrico"],
  nr12: ["Botão de emergência", "Proteção", "Sensor"]
};

function carregarChecklist() {
  const norma = document.getElementById("norma").value;
  const div = document.getElementById("checklist");

  div.innerHTML = "";

  itens[norma].forEach(item => {
    div.innerHTML += `
      <div>
        ${item}
        <select id="${item}">
          <option value="conforme">OK</option>
          <option value="nao_conforme">Problema</option>
        </select>
      </div>
    `;
  });
}

async function salvarChecklist() {

  const norma = document.getElementById("norma").value;

  for (const item of itens[norma]) {

    const status = document.getElementById(item).value;

    await fetch("https://api.lexusliftpro.com/inspecao", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        equipamento_id: "equip1",
        item: item,
        status: status,
        observacao: norma
      })
    });

  }

  document.getElementById("status").innerText = "Checklist salvo!";
  carregarDashboard();
}

async function carregarDashboard() {

  const res = await fetch("https://api.lexusliftpro.com/dashboard");
  const data = await res.json();

  document.getElementById("total").innerText = data.totalInspecoes;
  document.getElementById("nao").innerText = data.naoConformes;
  document.getElementById("os").innerText = data.osAbertas;
  document.getElementById("custo").innerText = data.custoTotal;

  document.getElementById("lista").innerText =
    JSON.stringify(data.listaOS, null, 2);
}

carregarChecklist();
carregarDashboard();

</script>

</body>
</html>

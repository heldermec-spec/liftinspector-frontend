<!DOCTYPE html>
<html>
<head>
  <title>LexusLiftPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f3f4f6; padding:20px;">

<h1>🚀 LexusLiftPro</h1>

<div style="background:white; padding:20px; border-radius:10px; max-width:500px;">
  
  <h3>Checklist Profissional</h3>

  <label>Norma:</label>
  <select id="norma" onchange="carregarChecklist()"
    style="width:100%; padding:10px; margin-bottom:10px;">
    <option value="nr11">NR11</option>
    <option value="nr10">NR10</option>
    <option value="nr12">NR12</option>
  </select>

  <div id="checklist"></div>

  <button onclick="salvarChecklist()"
    style="width:100%; padding:10px; background:#16a34a; color:white; border:none;">
    Salvar Inspeção
  </button>

  <p id="statusText"></p>

  <pre id="resultado" style="margin-top:15px;"></pre>

</div>

<script>

const itens = {
  nr11: ["Cabo de aço", "Gancho", "Corrente", "Freio"],
  nr10: ["Isolamento", "Aterramento", "Painel elétrico"],
  nr12: ["Botão de emergência", "Proteção", "Sensor"]
};

function carregarChecklist() {
  const norma = document.getElementById("norma").value;
  const div = document.getElementById("checklist");

  div.innerHTML = "";

  itens[norma].forEach(item => {
    div.innerHTML += `
      <div style="margin-bottom:10px;">
        <strong>${item}</strong><br>
        <select id="${item}">
          <option value="conforme">Conforme</option>
          <option value="nao_conforme">Não conforme</option>
        </select>
      </div>
    `;
  });
}

async function salvarChecklist() {

  const norma = document.getElementById("norma").value;

  document.getElementById("statusText").innerText = "Salvando...";

  let resultados = [];

  for (const item of itens[norma]) {

    const status = document.getElementById(item).value;

    try {

      const res = await fetch("https://api.lexusliftpro.com/inspecao", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          equipamento_id: "equip1",
          item: item,
          status: status,
          observacao: norma
        })
      });

      const data = await res.json();

      resultados.push(data);

    } catch (err) {
      console.error(err);
    }
  }

  document.getElementById("resultado").innerText =
    JSON.stringify(resultados, null, 2);

  document.getElementById("statusText").innerText =
    "✅ Checklist salvo com sucesso!";
}

carregarChecklist();

</script>

</body>
</html>

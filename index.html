<!DOCTYPE html>
<html>
<head>
  <title>LexusLiftPro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f3f4f6; padding:20px;">

<h1>🚀 LexusLiftPro</h1>

<div style="background:white; padding:20px; border-radius:10px; max-width:400px;">
  
  <h3>Checklist de Inspeção</h3>

  <label>Item:</label>
  <select id="item" style="width:100%; padding:10px; margin-bottom:10px;">
    <option value="cabo de aço">Cabo de aço</option>
    <option value="gancho">Gancho</option>
    <option value="corrente">Corrente</option>
    <option value="trilho">Trilho</option>
    <option value="alimentação elétrica">Alimentação elétrica</option>
  </select>

  <label>Status:</label>
  <select id="status" style="width:100%; padding:10px; margin-bottom:10px;">
    <option value="conforme">Conforme</option>
    <option value="nao_conforme">Não conforme</option>
  </select>

  <label>Observação:</label>
  <input id="obs" placeholder="Descreva o problema"
    style="width:100%; padding:10px; margin-bottom:10px;" />

  <button onclick="salvar()"
    style="width:100%; padding:10px; background:#16a34a; color:white; border:none;">
    Salvar Inspeção
  </button>

  <p id="statusText"></p>

  <pre id="resultado" style="margin-top:15px;"></pre>

</div>

<script>
function salvar() {

  const item = document.getElementById("item").value;
  const status = document.getElementById("status").value;
  const obs = document.getElementById("obs").value;

  document.getElementById("statusText").innerText = "Salvando...";

  fetch("https://api.lexusliftpro.com/inspecao", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      equipamento_id: "equip1",
      item: item,
      status: status,
      observacao: obs
    })
  })
  .then(res => res.json())
  .then(data => {

    document.getElementById("resultado").innerText =
      JSON.stringify(data, null, 2);

    if (data.os) {
      document.getElementById("statusText").innerText =
        "⚠️ OS gerada automaticamente!";
    } else {
      document.getElementById("statusText").innerText =
        "✅ Inspeção conforme!";
    }

  })
  .catch(err => {
    document.getElementById("statusText").innerText =
      "❌ Erro: " + err.message;
  });
}
</script>

</body>
</html>
